<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Parent Register – AHMSS</title>
<link rel="stylesheet" href="main.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-pg">
<div class="auth-card" style="max-width:500px">
  <div class="auth-logo-wrap">
    <img src="logo.png" class="auth-logo" alt="AHMSS"/>
    <div class="auth-ttl">Parent Registration</div>
    <div class="auth-sub">Create your account to apply for admission</div>
  </div>
  <div class="alert alert-err" id="err" style="display:none"><i class="fas fa-exclamation-circle"></i> <span id="eTxt"></span></div>
  <div class="alert alert-ok" id="ok" style="display:none"><i class="fas fa-check-circle"></i> Account created! Redirecting to login...</div>
  <div class="f-group"><label class="f-label">Full Name *</label><input class="f-input" id="name" placeholder="Your full name"/></div>
  <div class="f-group"><label class="f-label">Email Address *</label><input class="f-input" id="email" type="email" placeholder="email@example.com"/></div>
  <div class="f-group"><label class="f-label">Phone Number *</label><input class="f-input" id="phone" type="tel" placeholder="03XX-XXXXXXX"/></div>
  <div class="f-group"><label class="f-label">Password * (min 6 chars)</label><input class="f-input" id="pass" type="password" placeholder="Create a password"/></div>
  <div class="f-group"><label class="f-label">Confirm Password *</label><input class="f-input" id="pass2" type="password" placeholder="Repeat password"/></div>
  <button class="btn-auth" id="regBtn" onclick="doReg()"><i class="fas fa-user-plus"></i> Create Account</button>
  <div class="auth-links" style="margin-top:20px">Already have an account? <a href="parent-login.html">Login here</a> &nbsp;·&nbsp; <a href="index.html"><i class="fas fa-home"></i> Home</a></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore,doc,setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth,createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
const app=initializeApp({apiKey:"AIzaSyDY4km6C-eV8skgy7WeKiOK-lwjJrn1YBg",authDomain:"al-haseeb-model-sec-school.firebaseapp.com",projectId:"al-haseeb-model-sec-school",storageBucket:"al-haseeb-model-sec-school.firebasestorage.app",messagingSenderId:"317147728391",appId:"1:317147728391:web:cc489df27da6bae857b8a2"});
const db=getFirestore(app);const auth=getAuth(app);
window.doReg=async function(){
  const name=document.getElementById('name').value.trim(),email=document.getElementById('email').value.trim(),phone=document.getElementById('phone').value.trim(),pass=document.getElementById('pass').value,pass2=document.getElementById('pass2').value;
  const err=document.getElementById('err'),ok=document.getElementById('ok');
  err.style.display='none';ok.style.display='none';
  if(!name||!email||!phone||!pass){document.getElementById('eTxt').textContent='All fields required.';err.style.display='flex';return;}
  if(pass!==pass2){document.getElementById('eTxt').textContent='Passwords do not match.';err.style.display='flex';return;}
  if(pass.length<6){document.getElementById('eTxt').textContent='Password min 6 characters.';err.style.display='flex';return;}
  document.getElementById('regBtn').innerHTML='<span class="loader"></span> Creating...';
  try{
    const c=await createUserWithEmailAndPassword(auth,email,pass);
    await setDoc(doc(db,'parents',c.user.uid),{name,email,phone,uid:c.user.uid,createdAt:new Date().toISOString()});
    ok.style.display='flex';
    setTimeout(()=>window.location.href='parent-login.html',2000);
  }catch(e){
    let m='Registration failed.';
    if(e.code==='auth/email-already-in-use')m='This email is already registered.';
    if(e.code==='auth/invalid-email')m='Invalid email address.';
    document.getElementById('eTxt').textContent=m;err.style.display='flex';
  }
  document.getElementById('regBtn').innerHTML='<i class="fas fa-user-plus"></i> Create Account';
};
</script>
</body></html>
