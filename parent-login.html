<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Parent Login – AHMSS</title>
<link rel="stylesheet" href="main.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-pg">
<div class="auth-card">
  <div class="auth-logo-wrap">
    <img src="logo.png" class="auth-logo" alt="AHMSS"/>
    <div class="auth-ttl">Parent Portal</div>
    <div class="auth-sub">Login to manage your child's admission</div>
  </div>
  <div class="alert alert-err" id="err" style="display:none"><i class="fas fa-exclamation-circle"></i> <span id="eTxt"></span></div>
  <div class="f-group"><label class="f-label">Email Address</label><input class="f-input" id="email" type="email" placeholder="your@email.com"/></div>
  <div class="f-group"><label class="f-label">Password</label><input class="f-input" id="pw" type="password" placeholder="Your password"/></div>
  <button class="btn-auth" id="lBtn" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
  <div class="auth-links" style="margin-top:20px">No account? <a href="parent-register.html">Register here</a> &nbsp;·&nbsp; <a href="index.html"><i class="fas fa-home"></i> Home</a></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
const app=initializeApp({apiKey:"AIzaSyDY4km6C-eV8skgy7WeKiOK-lwjJrn1YBg",authDomain:"al-haseeb-model-sec-school.firebaseapp.com",projectId:"al-haseeb-model-sec-school",storageBucket:"al-haseeb-model-sec-school.firebasestorage.app",messagingSenderId:"317147728391",appId:"1:317147728391:web:cc489df27da6bae857b8a2"});const auth=getAuth(app);
window.doLogin=async function(){
  const email=document.getElementById('email').value.trim(),pw=document.getElementById('pw').value;
  const err=document.getElementById('err');err.style.display='none';
  if(!email||!pw){document.getElementById('eTxt').textContent='Fill all fields.';err.style.display='flex';return;}
  document.getElementById('lBtn').innerHTML='<span class="loader"></span> Logging in...';
  try{
    const c=await signInWithEmailAndPassword(auth,email,pw);
    sessionStorage.setItem('parentUID',c.user.uid);
    window.location.href='parent-portal.html';
  }catch(e){
    document.getElementById('eTxt').textContent='Wrong email or password.';err.style.display='flex';
  }
  document.getElementById('lBtn').innerHTML='<i class="fas fa-sign-in-alt"></i> Login';
};
document.addEventListener('keydown',e=>{if(e.key==='Enter')window.doLogin();});
</script>
</body></html>
