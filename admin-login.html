<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Login – AHMSS</title>
<link rel="stylesheet" href="main.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-pg">

<div class="auth-card">
  <div class="auth-logo-wrap">
    <img src="logo.png" class="auth-logo" alt="AHMSS"/>
    <div class="auth-ttl">Admin Login</div>
    <div class="auth-sub">Al Haseeb Database – Secure Access</div>
  </div>

  <div id="err-box" style="display:none;padding:13px 16px;border-radius:8px;margin-bottom:18px;font-size:13px;font-weight:500;background:#fef2f2;color:#991b1b;border:1px solid #fecaca;align-items:center;gap:9px;">
    <i class="fas fa-exclamation-circle"></i> <span id="eTxt"></span>
  </div>

  <div id="ok-box" style="display:none;padding:13px 16px;border-radius:8px;margin-bottom:18px;font-size:13px;font-weight:500;background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;align-items:center;gap:9px;">
    <i class="fas fa-check-circle"></i> Login successful! Redirecting...
  </div>

  <div class="f-group">
    <label class="f-label"><i class="fas fa-user"></i> Username</label>
    <input class="f-input" id="un" type="text" placeholder="Enter username" autocomplete="off"/>
  </div>
  <div class="f-group">
    <label class="f-label"><i class="fas fa-lock"></i> Password</label>
    <input class="f-input" id="pw" type="password" placeholder="Enter password"/>
  </div>

  <button class="btn-auth" id="lBtn" onclick="doLogin()">
    <i class="fas fa-sign-in-alt"></i> Login to Dashboard
  </button>

  <div class="auth-links" style="margin-top:20px">
    <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({apiKey:"AIzaSyDY4km6C-eV8skgy7WeKiOK-lwjJrn1YBg",authDomain:"al-haseeb-model-sec-school.firebaseapp.com",projectId:"al-haseeb-model-sec-school",storageBucket:"al-haseeb-model-sec-school.firebasestorage.app",messagingSenderId:"317147728391",appId:"1:317147728391:web:cc489df27da6bae857b8a2"});
const db = getFirestore(app);

// Auto-seed admin credentials on first load
async function seedAdmin() {
  try {
    const ref = doc(db, "admin_creds", "main");
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, { username: "Al Haseeb Database", password: "123456" });
      console.log("Admin credentials seeded.");
    }
  } catch(e) {
    console.log("Seed error:", e.message);
  }
}
seedAdmin();

function showErr(msg) {
  const box = document.getElementById('err-box');
  document.getElementById('eTxt').textContent = msg;
  box.style.display = 'flex';
  document.getElementById('ok-box').style.display = 'none';
}

function showOk() {
  document.getElementById('err-box').style.display = 'none';
  document.getElementById('ok-box').style.display = 'flex';
}

function setBtn(html) {
  document.getElementById('lBtn').innerHTML = html;
}

window.doLogin = async function() {
  const u = document.getElementById('un').value.trim();
  const p = document.getElementById('pw').value.trim();

  document.getElementById('err-box').style.display = 'none';

  if (!u || !p) {
    showErr('Please enter both username and password.');
    return;
  }

  setBtn('<span class="loader"></span> Verifying...');

  try {
    const ref = doc(db, "admin_creds", "main");
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      // Credentials not in DB yet - use hardcoded fallback & seed
      if (u === "Al Haseeb Database" && p === "123456") {
        await setDoc(ref, { username: "Al Haseeb Database", password: "123456" });
        sessionStorage.setItem('adminOK', '1');
        showOk();
        setTimeout(() => window.location.href = 'admin-dashboard.html', 1000);
      } else {
        showErr('Wrong username or password.');
      }
    } else {
      const data = snap.data();
      if (data.username === u && data.password === p) {
        sessionStorage.setItem('adminOK', '1');
        showOk();
        setTimeout(() => window.location.href = 'admin-dashboard.html', 1000);
      } else {
        showErr('Wrong username or password.');
      }
    }
  } catch(e) {
    console.error("Login error:", e);
    // Fallback: if Firestore fails, allow hardcoded login
    if (u === "Al Haseeb Database" && p === "123456") {
      sessionStorage.setItem('adminOK', '1');
      showOk();
      setTimeout(() => window.location.href = 'admin-dashboard.html', 1000);
    } else {
      showErr('Connection error. Try: Username = "Al Haseeb Database", Password = "123456"');
    }
  }

  setBtn('<i class="fas fa-sign-in-alt"></i> Login to Dashboard');
};

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') window.doLogin();
});
</script>
</body>
</html>
