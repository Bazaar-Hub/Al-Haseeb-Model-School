const app = initializeApp({apiKey:"AIzaSyDY4km6C-eV8skgy7WeKiOK-lwjJrn1YBg",authDomain:"al-haseeb-model-sec-school.firebaseapp.com",projectId:"al-haseeb-model-sec-school",storageBucket:"al-haseeb-model-sec-school.firebasestorage.app",messagingSenderId:"317147728391",appId:"1:317147728391:web:cc489df27da6bae857b8a2"});

async function seedAdmin() {
  try {
    const ref = doc(db, "admin_creds", "main");
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, { username: "Al Haseeb Database", password: "123456" });

function showErr(msg) {
  const box = document.getElementById('err-box');
  document.getElementById('eTxt').textContent = msg;
  box.style.display = 'flex';
  document.getElementById('ok-box').style.display = 'none';
}

function showOk() {
  document.getElementById('err-box').style.display = 'none';
  document.getElementById('ok-box').style.display = 'flex';
}

function setBtn(html) {
  document.getElementById('lBtn').innerHTML = html;
}

window.doLogin = async function() {
  const u = document.getElementById('un').value.trim();
  const p = document.getElementById('pw').value.trim();

  document.getElementById('err-box').style.display = 'none';

  if (!u || !p) {
    showErr('Please enter both username and password.');
    return;
  }

  setBtn('<span class="loader"></span> Verifying...');

  try {
    const ref = doc(db, "admin_creds", "main");
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      // Credentials not in DB yet - use hardcoded fallback & seed
      if (u === "Al Haseeb Database" && p === "123456") {
        await setDoc(ref, { username: "Al Haseeb Database", password: "123456" });

        showOk();
        setTimeout(() => window.location.href = 'admin-dashboard.html', 1000);
      } else {
        showErr('Wrong username or password.');
      }
    } else {
      const data = snap.data();
      if (data.username === u && data.password === p) {
        sessionStorage.setItem('adminOK', '1');
        showOk();
        setTimeout(() => window.location.href = 'admin-dashboard.html', 1000);
      } else {
        showErr('Wrong username or password.');
      }
    }
  } catch(e) {
    console.error("Login error:", e);
    // Fallback: if Firestore fails, allow hardcoded login
    if (u === "Al Haseeb Database" && p === "123456") {
      sessionStorage.setItem('adminOK', '1');
      showOk();
      setTimeout(() => window.location.href = 'admin-dashboard.html', 1000);
    } else {
      showErr('Connection error. Try: Username = "Al Haseeb Database", Password = "123456"');
    }
  }

  setBtn('<i class="fas fa-sign-in-alt"></i> Login to Dashboard');
};

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') window.doLogin();
});
</script>
</body>
</html>
